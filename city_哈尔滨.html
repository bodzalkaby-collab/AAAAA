<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>哈尔滨 - 24小时温度变化</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#0a0a1a;color:#e0e0e0}
.container{max-width:900px;margin:0 auto;padding:20px}
.header{text-align:center;padding:30px 20px;background:linear-gradient(135deg,#0f0f23 0%,#1a1a3e 50%,#0f0f23 100%);border-bottom:2px solid #4dd0e133;margin-bottom:20px}
.header h1{font-size:1.8em;color:#fff}
.header .city-meta{color:#888;font-size:0.9em}
.back-btn{display:inline-block;padding:8px 20px;background:#4dd0e122;color:#4dd0e1;border:1px solid #4dd0e144;border-radius:20px;text-decoration:none;font-size:0.9em}
.card{background:#12122a;border-radius:16px;padding:20px;border:1px solid #1a1a3e;margin-bottom:20px}
.card-title{font-size:1.1em;font-weight:600;margin-bottom:14px;color:#fff}
.chart-wrapper{position:relative;width:100%;min-height:400px}
.current-weather{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.metric-card{background:#1a1a3e;border-radius:12px;padding:12px;text-align:center}
.metric-card .label{font-size:0.75em;color:#888}
.metric-card .value{font-size:1.3em;font-weight:700;color:#fff}
.aqi-good{color:#4fc3f7}.aqi-moderate{color:#ffeb3b}.aqi-unhealthy{color:#ff9800}.aqi-bad{color:#f44336}
.footer{text-align:center;padding:20px;color:#444;font-size:0.8em}
@media(max-width:600px){.current-weather{grid-template-columns:repeat(2,1fr)}
</style>
</head>
<body>
<div class="header">
  <h1>哈尔滨</h1>
  <div class="city-meta">小毛毛雨 &middot; 16.0°C &middot; 湿度 72.0% &middot; 风速 9.1 ENE</div>
  <a class="back-btn" href="./index.html">&larr; 返回总览</a>
</div>
<div class="container">
  <div class="current-weather">
    <div class="metric-card"><div class="label">&#x1F321;&#xFE0F; 温度</div><div class="value">16.0°C</div></div>
    <div class="metric-card"><div class="label">&#x1F917; 体感</div><div class="value">15.0°C</div></div>
    <div class="metric-card"><div class="label">&#x1F4A7; 湿度</div><div class="value">72.0%</div></div>
    <div class="metric-card"><div class="label">&#x1F4A8; 风速</div><div class="value">9.1 ENE</div></div>
    <div class="metric-card"><div class="label">&#x1F3ED; AQI</div><div class="value aqi-good">12</div></div>
    <div class="metric-card"><div class="label">&#x2600;&#xFE0F; UV</div><div class="value" style="color:#ffeb3b">3.5</div></div>
    <div class="metric-card"><div class="label">&#x1F327;&#xFE0F; 降水</div><div class="value">0.1mm</div></div>
    <div class="metric-card"><div class="label">&#x1F4CA; 气压</div><div class="value">997.6hPa</div></div>
  </div>
  <div class="card">
    <div class="card-title">&#x1F4C8; 过去24小时温度变化</div>
    <div class="chart-wrapper"><canvas id="tempChart"></canvas></div>
    <p style="text-align:center;color:#555;font-size:0.85em;margin-top:10px">每小时自动采集 &middot; 最近24条记录</p>
  </div>
</div>
<div class="footer">&#x1F99E; Claw 作业系统 &middot; 哈尔滨</div>
<script>
const histData = [{"time": "2026-06-13 22:45", "temp": 18.1, "feels": 16.4, "humid": 55.0, "desc": "阴天"}, {"time": "2026-06-13 23:00", "temp": 18.0, "feels": 16.3, "humid": 55.0, "desc": "阴天"}, {"time": "2026-06-13 23:15", "temp": 18.0, "feels": 16.3, "humid": 55.0, "desc": "阴天"}, {"time": "2026-06-13 23:30", "temp": 17.9, "feels": 16.4, "humid": 56.0, "desc": "阴天"}, {"time": "2026-06-13 23:45", "temp": 17.8, "feels": 16.4, "humid": 57.0, "desc": "阴天"}, {"time": "2026-06-14 00:00", "temp": 17.7, "feels": 16.5, "humid": 58.0, "desc": "阴天"}, {"time": "2026-06-14 00:15", "temp": 17.6, "feels": 16.4, "humid": 59.0, "desc": "阴天"}, {"time": "2026-06-14 00:30", "temp": 17.4, "feels": 16.2, "humid": 61.0, "desc": "阴天"}, {"time": "2026-06-14 00:45", "temp": 17.1, "feels": 15.9, "humid": 63.0, "desc": "阴天"}, {"time": "2026-06-14 01:00", "temp": 16.9, "feels": 15.7, "humid": 65.0, "desc": "阴天"}, {"time": "2026-06-14 01:15", "temp": 16.5, "feels": 15.4, "humid": 68.0, "desc": "毛毛雨"}, {"time": "2026-06-14 01:30", "temp": 16.1, "feels": 15.1, "humid": 72.0, "desc": "毛毛雨"}, {"time": "2026-06-14 01:45", "temp": 15.7, "feels": 14.8, "humid": 77.0, "desc": "毛毛雨"}, {"time": "2026-06-14 02:00", "temp": 15.4, "feels": 14.6, "humid": 80.0, "desc": "毛毛雨"}, {"time": "2026-06-14 02:15", "temp": 15.2, "feels": 14.5, "humid": 83.0, "desc": "大毛毛雨"}, {"time": "2026-06-14 02:30", "temp": 15.1, "feels": 14.5, "humid": 84.0, "desc": "大毛毛雨"}, {"time": "2026-06-14 02:45", "temp": 15.0, "feels": 14.4, "humid": 85.0, "desc": "大毛毛雨"}, {"time": "2026-06-14 03:00", "temp": 15.0, "feels": 14.4, "humid": 86.0, "desc": "大毛毛雨"}, {"time": "2026-06-14 03:15", "temp": 14.9, "feels": 14.5, "humid": 87.0, "desc": "小毛毛雨"}, {"time": "2026-06-14 03:30", "temp": 14.9, "feels": 14.5, "humid": 88.0, "desc": "小毛毛雨"}, {"time": "2026-06-14 03:45", "temp": 14.9, "feels": 13.8, "humid": 75.0, "desc": "小毛毛雨"}, {"time": "2026-06-14 04:00", "temp": 14.9, "feels": 13.9, "humid": 76.0, "desc": "阴天"}, {"time": "2026-06-14 04:15", "temp": 16.2, "feels": 15.1, "humid": 71.0, "desc": "小毛毛雨"}, {"time": "2026-06-14 04:30", "temp": 16.0, "feels": 15.0, "humid": 72.0, "desc": "小毛毛雨"}];
function initChart() {
  new Chart(document.getElementById('tempChart').getContext('2d'), {
    type: 'line',
    data: {
      labels: histData.map(function(d){ return d.time.slice(5, 16); }),
      datasets: [
        { label: '温度 (°C)', data: histData.map(function(d){ return d.temp; }), borderColor: '#4dd0e1', backgroundColor: '#4dd0e122', fill: true, tension: 0.3, pointRadius: 4, borderWidth: 3 },
        { label: '体感 (°C)', data: histData.map(function(d){ return d.feels; }), borderColor: '#ffb74d', backgroundColor: '#ffb74d22', fill: true, tension: 0.3, pointRadius: 3, borderWidth: 2, borderDash: [5, 5] }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color: '#aaa', font: { size: 13 } } } },
      scales: { x: { ticks: { color: '#666' }, grid: { color: '#ffffff0d' } }, y: { ticks: { color: '#666' }, grid: { color: '#ffffff0d' } } }
    }
  });
}
initChart();
</script>
</body>
</html>
