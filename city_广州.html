<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>广州 - 24小时温度变化</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#0a0a1a;color:#e0e0e0;min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:20px}
.header{text-align:center;padding:30px 20px 20px;background:linear-gradient(135deg,#0f0f23 0%,#1a1a3e 50%,#0f0f23 100%);border-bottom:2px solid #e5737333;margin-bottom:20px}
.header h1{font-size:1.8em;color:#fff;margin-bottom:4px}
.header .city-meta{color:#888;font-size:0.9em}
.back-btn{display:inline-block;padding:8px 20px;background:#e5737322;color:#e57373;border:1px solid #e5737344;border-radius:20px;text-decoration:none;font-size:0.9em;margin:10px 0;transition:all 0.3s}
.back-btn:hover{background:#e5737344;color:#fff}
.card{background:#12122a;border-radius:16px;padding:20px;border:1px solid #1a1a3e;margin-bottom:20px}
.card-title{font-size:1.1em;font-weight:600;margin-bottom:14px;color:#fff;display:flex;align-items:center;gap:10px}
.chart-wrapper{position:relative;width:100%;min-height:400px}
.current-weather{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.metric-card{background:#1a1a3e;border-radius:12px;padding:12px;text-align:center}
.metric-card .label{font-size:0.75em;color:#888;margin-bottom:4px}
.metric-card .value{font-size:1.3em;font-weight:700;color:#fff}
.aqi-good{color:#00e676}.aqi-moderate{color:#ffeb3b}.aqi-unhealthy{color:#ff9800}.aqi-bad{color:#f44336}
.footer{text-align:center;padding:20px;color:#444;font-size:0.8em;border-top:1px solid #1a1a3e;margin-top:10px}
@media(max-width:600px){.current-weather{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="header">
  <h1>广州</h1>
  <div class="city-meta">阴天 · 29.4°C · 湿度 77.0% · 风速 9.3 S</div>
  <a class="back-btn" href="./index.html">← 返回总览</a>
</div>
<div class="container">
  <div class="current-weather">
    <div class="metric-card"><div class="label">🌡️ 温度</div><div class="value">29.4°C</div></div>
    <div class="metric-card"><div class="label">🤗 体感</div><div class="value">34.6°C</div></div>
    <div class="metric-card"><div class="label">💧 湿度</div><div class="value">77.0%</div></div>
    <div class="metric-card"><div class="label">🌬 风速</div><div class="value">9.3 S</div></div>
    <div class="metric-card"><div class="label">🏭 AQI</div><div class="value aqi-moderate">70</div></div>
    <div class="metric-card"><div class="label">☀️ UV</div><div class="value" style="color:#f44336">7.3</div></div>
    <div class="metric-card"><div class="label">🌧 降水</div><div class="value">0.0mm</div></div>
    <div class="metric-card"><div class="label">📊 气压</div><div class="value">1008.0hPa</div></div>
  </div>
  <div class="card">
    <div class="card-title">📈 过去24小时温度变化</div>
    <div class="chart-wrapper">
      <canvas id="tempChart"></canvas>
    </div>
    <p style="text-align:center;color:#555;font-size:0.85em;margin-top:10px">每小时自动采集 · 最近24条记录</p>
  </div>
</div>
<div class="footer">🦞 Claw 作业系统 · 广州 · 数据来源: Open-Meteo API</div>
<script>
const histData = [{"time": "2026-06-12 14:49", "temp": 31.1, "feels": 36.7, "humid": 64.0, "desc": "阴天"}, {"time": "2026-06-12 15:05", "temp": 30.7, "feels": 36.0, "humid": 66.0, "desc": "阴天"}, {"time": "2026-06-12 16:05", "temp": 26.9, "feels": 31.4, "humid": 86.0, "desc": "阵雨"}, {"time": "2026-06-12 17:05", "temp": 25.7, "feels": 31.3, "humid": 96.0, "desc": "大阵雨"}, {"time": "2026-06-12 18:05", "temp": 26.1, "feels": 31.5, "humid": 95.0, "desc": "阵雨"}, {"time": "2026-06-12 19:05", "temp": 25.9, "feels": 31.3, "humid": 95.0, "desc": "阴天"}, {"time": "2026-06-12 20:05", "temp": 25.5, "feels": 31.0, "humid": 96.0, "desc": "多云"}, {"time": "2026-06-12 21:05", "temp": 25.5, "feels": 31.0, "humid": 94.0, "desc": "阴天"}, {"time": "2026-06-12 22:05", "temp": 25.3, "feels": 30.3, "humid": 94.0, "desc": "阴天"}, {"time": "2026-06-13 01:05", "temp": 25.3, "feels": 30.5, "humid": 93.0, "desc": "阴天"}, {"time": "2026-06-13 02:05", "temp": 25.3, "feels": 30.3, "humid": 93.0, "desc": "阴天"}, {"time": "2026-06-13 04:05", "temp": 25.4, "feels": 30.2, "humid": 93.0, "desc": "阴天"}, {"time": "2026-06-13 05:05", "temp": 25.4, "feels": 30.2, "humid": 93.0, "desc": "阴天"}, {"time": "2026-06-13 07:05", "temp": 26.4, "feels": 31.2, "humid": 88.0, "desc": "阴天"}, {"time": "2026-06-13 08:05", "temp": 27.2, "feels": 32.0, "humid": 84.0, "desc": "阴天"}, {"time": "2026-06-13 09:05", "temp": 28.8, "feels": 33.7, "humid": 79.0, "desc": "阴天"}, {"time": "2026-06-13 10:05", "temp": 29.4, "feels": 34.6, "humid": 77.0, "desc": "阴天"}];

function initChart() {
  const ctx = document.getElementById('tempChart').getContext('2d');
  const times = histData.map(d => d.time.slice(5, 16));
  const temps = histData.map(d => d.temp);
  const feels = histData.map(d => d.feels);

  new Chart(ctx, {
    type: 'line',
    data: {
      labels: times,
      datasets: [
        {
          label: '实际温度 (°C)',
          data: temps,
          borderColor: '#e57373',
          backgroundColor: '#e5737322',
          fill: true,
          tension: 0.3,
          pointRadius: 4,
          pointHoverRadius: 7,
          pointBackgroundColor: '#e57373',
          borderWidth: 3
        },
        {
          label: '体感温度 (°C)',
          data: feels,
          borderColor: '#ffb74d',
          backgroundColor: '#ffb74d22',
          fill: true,
          tension: 0.3,
          pointRadius: 3,
          pointHoverRadius: 6,
          pointBackgroundColor: '#ffb74d',
          borderWidth: 2,
          borderDash: [5, 5]
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          labels: { color: '#aaa', font: { size: 13 } },
          position: 'top'
        },
        tooltip: {
          backgroundColor: '#1a1a3e',
          titleColor: '#fff',
          bodyColor: '#ddd',
          borderColor: '#e5737344',
          borderWidth: 1,
          padding: 12
        }
      },
      scales: {
        x: {
          ticks: { color: '#666', maxRotation: 45, font: { size: 11 } },
          grid: { color: '#ffffff0d' }
        },
        y: {
          ticks: { color: '#666', font: { size: 11 } },
          grid: { color: '#ffffff0d' }
        }
      }
    }
  });
}

initChart();
</script>
</body>
</html>
