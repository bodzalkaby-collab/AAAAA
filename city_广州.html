<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>广州 - 24小时温度变化</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#0a0a1a;color:#e0e0e0}
.container{max-width:900px;margin:0 auto;padding:20px}
.header{text-align:center;padding:30px 20px;background:linear-gradient(135deg,#0f0f23 0%,#1a1a3e 50%,#0f0f23 100%);border-bottom:2px solid #e5737333;margin-bottom:20px}
.header h1{font-size:1.8em;color:#fff}
.header .city-meta{color:#888;font-size:0.9em}
.back-btn{display:inline-block;padding:8px 20px;background:#e5737322;color:#e57373;border:1px solid #e5737344;border-radius:20px;text-decoration:none;font-size:0.9em}
.card{background:#12122a;border-radius:16px;padding:20px;border:1px solid #1a1a3e;margin-bottom:20px}
.card-title{font-size:1.1em;font-weight:600;margin-bottom:14px;color:#fff}
.chart-wrapper{position:relative;width:100%;min-height:400px}
.current-weather{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.metric-card{background:#1a1a3e;border-radius:12px;padding:12px;text-align:center}
.metric-card .label{font-size:0.75em;color:#888}
.metric-card .value{font-size:1.3em;font-weight:700;color:#fff}
.aqi-good{color:#00e676}.aqi-moderate{color:#ffeb3b}.aqi-unhealthy{color:#ff9800}.aqi-bad{color:#f44336}
.footer{text-align:center;padding:20px;color:#444;font-size:0.8em}
@media(max-width:600px){.current-weather{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="header">
  <h1>广州</h1>
  <div class="city-meta">阴天 &middot; 27.1°C &middot; 湿度 87.0% &middot; 风速 9.9 S</div>
  <a class="back-btn" href="./index.html">&larr; 返回总览</a>
</div>
<div class="container">
  <div class="current-weather">
    <div class="metric-card"><div class="label">&#x1F321;&#xFE0F; 温度</div><div class="value">27.1°C</div></div>
    <div class="metric-card"><div class="label">&#x1F917; 体感</div><div class="value">32.2°C</div></div>
    <div class="metric-card"><div class="label">&#x1F4A7; 湿度</div><div class="value">87.0%</div></div>
    <div class="metric-card"><div class="label">&#x1F4A8; 风速</div><div class="value">9.9 S</div></div>
    <div class="metric-card"><div class="label">&#x1F3ED; AQI</div><div class="value aqi-moderate">66</div></div>
    <div class="metric-card"><div class="label">&#x2600;&#xFE0F; UV</div><div class="value" style="color:#f44336">7.3</div></div>
    <div class="metric-card"><div class="label">&#x1F327;&#xFE0F; 降水</div><div class="value">0.0mm</div></div>
    <div class="metric-card"><div class="label">&#x1F4CA; 气压</div><div class="value">1004.3hPa</div></div>
  </div>
  <div class="card">
    <div class="card-title">&#x1F4C8; 过去24小时温度变化</div>
    <div class="chart-wrapper"><canvas id="tempChart"></canvas></div>
    <p style="text-align:center;color:#555;font-size:0.85em;margin-top:10px">每小时自动采集 &middot; 最近24条记录</p>
  </div>
</div>
<div class="footer">&#x1F99E; Claw 作业系统 &middot; 广州</div>
<script>
const histData = [{"time": "2026-06-13 14:35", "temp": 28.6, "feels": 33.1, "humid": 80.0, "desc": "中阵雨"}, {"time": "2026-06-13 15:05", "temp": 27.2, "feels": 31.2, "humid": 86.0, "desc": "中阵雨"}, {"time": "2026-06-13 15:35", "temp": 27.2, "feels": 32.0, "humid": 88.0, "desc": "大毛毛雨"}, {"time": "2026-06-13 16:05", "temp": 27.6, "feels": 33.3, "humid": 87.0, "desc": "大毛毛雨"}, {"time": "2026-06-13 16:35", "temp": 28.0, "feels": 33.4, "humid": 84.0, "desc": "小毛毛雨"}, {"time": "2026-06-13 18:05", "temp": 28.4, "feels": 33.8, "humid": 82.0, "desc": "阴天"}, {"time": "2026-06-13 19:05", "temp": 28.3, "feels": 33.5, "humid": 82.0, "desc": "阴天"}, {"time": "2026-06-13 19:26", "temp": 28.2, "feels": 33.4, "humid": 82.0, "desc": "阴天"}, {"time": "2026-06-13 19:30", "temp": 28.1, "feels": 33.3, "humid": 82.0, "desc": "阴天"}, {"time": "2026-06-13 19:45", "temp": 28.0, "feels": 33.1, "humid": 83.0, "desc": "阴天"}, {"time": "2026-06-13 20:00", "temp": 27.9, "feels": 32.9, "humid": 83.0, "desc": "阴天"}, {"time": "2026-06-13 20:15", "temp": 27.9, "feels": 32.8, "humid": 83.0, "desc": "阴天"}, {"time": "2026-06-13 20:30", "temp": 27.8, "feels": 32.8, "humid": 83.0, "desc": "阴天"}, {"time": "2026-06-13 20:45", "temp": 27.8, "feels": 32.7, "humid": 83.0, "desc": "阴天"}, {"time": "2026-06-13 21:00", "temp": 27.7, "feels": 32.6, "humid": 83.0, "desc": "阴天"}, {"time": "2026-06-13 21:15", "temp": 27.7, "feels": 32.5, "humid": 83.0, "desc": "阴天"}, {"time": "2026-06-13 21:30", "temp": 27.6, "feels": 32.5, "humid": 84.0, "desc": "阴天"}, {"time": "2026-06-13 21:45", "temp": 27.6, "feels": 32.4, "humid": 84.0, "desc": "阴天"}, {"time": "2026-06-13 22:00", "temp": 27.3, "feels": 32.1, "humid": 86.0, "desc": "阴天"}, {"time": "2026-06-13 22:03", "temp": 27.3, "feels": 32.1, "humid": 86.0, "desc": "阴天"}, {"time": "2026-06-13 22:06", "temp": 27.3, "feels": 32.1, "humid": 86.0, "desc": "阴天"}, {"time": "2026-06-13 22:15", "temp": 27.2, "feels": 32.1, "humid": 86.0, "desc": "阴天"}, {"time": "2026-06-13 22:30", "temp": 27.1, "feels": 32.1, "humid": 87.0, "desc": "阴天"}, {"time": "2026-06-13 22:45", "temp": 27.1, "feels": 32.2, "humid": 87.0, "desc": "阴天"}];
function initChart() {{
  new Chart(document.getElementById('tempChart').getContext('2d'), {{
    type: 'line',
    data: {{
      labels: histData.map(function(d){{ return d.time.slice(5, 16); }}),
      datasets: [
        {{ label: '温度 (°C)', data: histData.map(function(d){{ return d.temp; }}), borderColor: '#e57373', backgroundColor: '#e5737322', fill: true, tension: 0.3, pointRadius: 4, borderWidth: 3 }},
        {{ label: '体感 (°C)', data: histData.map(function(d){{ return d.feels; }}), borderColor: '#ffb74d', backgroundColor: '#ffb74d22', fill: true, tension: 0.3, pointRadius: 3, borderWidth: 2, borderDash: [5, 5] }}
      ]
    }},
    options: {{
      responsive: true, maintainAspectRatio: false,
      plugins: {{ legend: {{ labels: {{ color: '#aaa', font: {{ size: 13 }} }} }} }},
      scales: {{ x: {{ ticks: {{ color: '#666' }}, grid: {{ color: '#ffffff0d' }} }}, y: {{ ticks: {{ color: '#666' }}, grid: {{ color: '#ffffff0d' }} }} }}
    }}
  }});
}}
initChart();
</script>
</body>
</html>
