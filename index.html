<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claw 团队作业 - 数据平台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#0a0a1a;color:#e0e0e0;min-height:100vh}
.container{max-width:1400px;margin:0 auto;padding:20px}
.header{text-align:center;padding:20px 20px;background:linear-gradient(135deg,#0f0f23 0%,#1a1a3e 50%,#0f0f23 100%);border-bottom:2px solid #00d4ff33;margin-bottom:20px}
.header h1{font-size:2em;background:linear-gradient(135deg,#00d4ff,#7c4dff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header .subtitle{color:#888;margin-top:6px;font-size:0.9em}
.claw-bar{display:flex;justify-content:center;gap:12px;margin-top:14px;flex-wrap:wrap}
.claw-btn{padding:10px 24px;border-radius:20px;font-size:0.95em;font-weight:600;cursor:pointer;transition:all 0.3s;border:none;background:rgba(255,255,255,0.05);color:#666;position:relative}
.claw-btn:hover{background:rgba(255,255,255,0.1);color:#aaa}
.claw-btn.active{background:rgba(0,212,255,0.15);border:1px solid #00d4ff;color:#00d4ff}
.claw-btn .badge{display:block;font-size:0.7em;font-weight:400;margin-top:2px;opacity:0.6}
.claw-btn.active .badge{opacity:1;color:#4fc3f7}
.claw-btn .dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:6px;vertical-align:middle}
.dot.online{background:#43e97b;box-shadow:0 0 6px #43e97b}
.dot.offline{background:#666}
.claw-panel{display:none}
.claw-panel.active{display:block;animation:fadeIn 0.3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.update-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;background:#12122a;border-radius:12px;margin-bottom:20px;border:1px solid #1a1a3e;flex-wrap:wrap;gap:10px}
.update-bar .time{color:#4fc3f7;font-size:0.9em}
.update-bar .hint{color:#666;font-size:0.85em}
.city-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;margin-bottom:20px}
.city-card{background:#12122a;border-radius:16px;padding:16px;border:1px solid #1a1a3e;transition:all 0.3s;cursor:pointer;text-decoration:none;display:block;color:inherit}
.city-card:hover{border-color:#00d4ff66;box-shadow:0 4px 20px rgba(0,212,255,0.1);transform:translateY(-2px)}
.city-name{font-size:1.2em;font-weight:700;margin-bottom:10px;color:#fff}
.city-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.metric{display:flex;flex-direction:column;align-items:center;padding:5px;background:#1a1a3e;border-radius:8px}
.m-icon{font-size:0.9em}.m-val{font-size:0.95em;font-weight:700;color:#fff}.m-desc{font-size:0.7em;color:#888}
.aqi-good{color:#00e676}.aqi-moderate{color:#ffeb3b}.aqi-unhealthy{color:#ff9800}.aqi-bad{color:#f44336}
.card{background:#12122a;border-radius:16px;padding:18px;border:1px solid #1a1a3e;margin-bottom:20px}
.card-title{font-size:1.1em;font-weight:600;margin-bottom:14px;color:#fff;display:flex;align-items:center;gap:10px}
.chart-img{width:100%;height:auto;border-radius:8px;cursor:pointer;transition:transform 0.3s}
.chart-img:hover{transform:scale(1.02);cursor:zoom-in}
.chart-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.agent-panel{display:flex;justify-content:center;align-items:center;gap:10px;flex-wrap:wrap;padding:6px 0}
.agent-card{background:#1a1a3e;border:1px solid #333;border-radius:14px;padding:14px 18px;text-align:center;cursor:pointer;transition:all 0.3s;flex:1;min-width:120px;max-width:180px}
.agent-card:hover{border-color:#00d4ff66;background:#1a1a45}
.agent-card.running{border-color:#00d4ff;box-shadow:0 0 16px rgba(0,212,255,0.15)}
.agent-card.done{border-color:#00e676;background:#0f2a1a}
.agent-card.error{border-color:#f44336;background:#2a0f0f}
.agent-icon{font-size:1.6em;margin-bottom:4px}
.agent-name{font-size:1em;font-weight:700;color:#fff;margin-bottom:2px}
.agent-desc{font-size:0.75em;color:#888;margin-bottom:6px}
.agent-status{font-size:0.75em;display:flex;align-items:center;justify-content:center;gap:5px}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%}
.status-dot.idle{background:#555}
.status-dot.running{background:#00d4ff;animation:pulse 0.8s ease-in-out infinite}
.status-dot.done{background:#00e676}
.status-dot.error{background:#f44336}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.agent-arrow{font-size:1.3em;color:#444;font-weight:700}
.run-btn{padding:8px 28px;border-radius:20px;border:none;background:linear-gradient(135deg,#00d4ff,#7c4dff);color:#fff;font-size:0.9em;font-weight:600;cursor:pointer;transition:all 0.3s}
.run-btn:hover{transform:scale(1.05);box-shadow:0 4px 16px rgba(0,212,255,0.25)}
.run-btn:disabled{opacity:0.4;cursor:not-allowed}
.agent-log{background:#0d0d20;border:1px solid #1a1a3e;border-radius:10px;padding:10px 14px;margin-top:12px;min-height:30px;max-height:120px;overflow-y:auto;font-size:0.8em;font-family:monospace}
.log-entry{padding:2px 0;color:#ccc}
.log-entry.muted{color:#555}
.footer{text-align:center;padding:20px;color:#444;font-size:0.8em;border-top:1px solid #1a1a3e;margin-top:30px}
@media(max-width:900px){.chart-grid{grid-template-columns:1fr}.city-grid{grid-template-columns:1fr}.agent-panel{flex-direction:column}.agent-arrow{transform:rotate(90deg)}}
</style>
</head>

</div>

// Render cities
function renderCities(){
  var grid = document.getElementById('cityGrid');
  grid.innerHTML = '';
  C.forEach(function(c){
    var aqiCls = c.aqi <= 50 ? 'aqi-good' : c.aqi <= 100 ? 'aqi-moderate' : c.aqi <= 150 ? 'aqi-unhealthy' : 'aqi-bad';
    var uvClr = '#00e676';
    if(c.uv_level=='中等') uvClr='#ffeb3b'; else if(c.uv_level=='高'||c.uv_level=='很高') uvClr='#ff9800'; else if(c.uv_level=='极高') uvClr='#f44336';
    grid.innerHTML += '<div class="city-card" style="border-left:4px solid '+c.color+'"><div class="city-name">'+c.name+'</div><div class="city-metrics">'
      +'<div class="metric"><span class="m-icon">🌡️</span><span class="m-val">'+(c.temp||'--')+'°C</span><span class="m-desc">'+c.desc+'</span></div>'
      +'<div class="metric"><span class="m-icon">🤗</span><span class="m-val">'+(c.feels||'--')+'°C</span><span class="m-desc">体感</span></div>'
      +'<div class="metric"><span class="m-icon">💧</span><span class="m-val">'+(c.hum||'--')+'%</span><span class="m-desc">湿度</span></div>'
      +'<div class="metric"><span class="m-icon">🌀</span><span class="m-val">'+(c.pres||'--')+'</span><span class="m-desc">hPa</span></div>'
      +'<div class="metric"><span class="m-icon">💨</span><span class="m-val">'+((c.wind_spd||'--')+' '+(c.wind_dir||''))+'</span><span class="m-desc">风速</span></div>'
      +'<div class="metric"><span class="m-icon">🌧️</span><span class="m-val">'+(c.precip||'--')+'mm</span><span class="m-desc">降水</span></div>'
      +'<div class="metric"><span class="m-icon">🏭</span><span class="m-val '+aqiCls+'">'+c.aqi+'</span><span class="m-desc">'+c.aqi_level+'</span></div>'
      +'<div class="metric"><span class="m-icon">☀️</span><span class="m-val" style="color:'+uvClr+'">'+c.uv+'</span><span class="m-desc">'+c.uv_level+'</span></div>'
      +'<div class="metric" style="grid-column:span 3"><span class="m-icon">⚠️</span><span class="m-desc">'+c.alert+'</span></div>'
      +'</div></div>';
  });
}

  var grid = document.getElementById('chartGrid');

// Agent control
function setStatus(agent, state, text){
  var el = document.getElementById('status-'+agent);
  if(!el) return;
  el.innerHTML = '<span class="status-dot '+state+'"></span> '+text;
}
function addLog(msg, cls){
  var log = document.getElementById('agentLog');
  var entry = document.createElement('div');
  entry.className = 'log-entry' + (cls ? ' '+cls : '');
  entry.textContent = msg;
  log.appendChild(entry);
  log.scrollTop = log.scrollHeight;
}
function pollStatus(){
  fetch(API_HOST+'/api/agent/status')
    .then(function(r){return r.json()})
    .then(function(data){
      setStatus('a', data.agents.a.status, data.agents.a.status==='idle'?'空闲':data.agents.a.status==='running'?'运行中':data.agents.a.status==='done'?'已完成':'失败');
      setStatus('b', data.agents.b.status, data.agents.b.status==='idle'?'空闲':data.agents.b.status==='running'?'运行中':data.agents.b.status==='done'?'已完成':'失败');
      setStatus('c', data.agents.c.status, data.agents.c.status==='idle'?'空闲':data.agents.c.status==='running'?'运行中':data.agents.c.status==='done'?'已完成':'失败');
      var log = document.getElementById('agentLog');
      if(data.log && data.log.length > 0){
        log.innerHTML = '';
        data.log.forEach(function(l){addLog(l)});
      }
      var btn = document.getElementById('runBtn');
      if(data.pipeline === 'running'){
        btn.disabled = true;
        btn.textContent = '⏳ 流水线运行中...';
      } else {
        btn.disabled = false;
        btn.textContent = data.pipeline === 'done' ? '🔄 重新运行流水线' : '▶ 运行整条流水线';
      }
      if(data.pipeline === 'running' && !pollTimer){
        pollTimer = setTimeout(function(){pollTimer=null;pollStatus()}, 2000);
      }
    }).catch(function(err){});
}
function runPipeline(){
  var btn = document.getElementById('runBtn');
  if(btn.disabled) return;
  btn.disabled = true;
  btn.textContent = '⏳ 启动中...';
  fetch(API_HOST+'/api/agent/run', {method:'POST'})
    .then(function(r){return r.json()})
    .then(function(data){
      addLog('🚀 流水线已启动');
      setStatus('a', 'running', '运行中');
      setStatus('b', 'pending', '等待');
      setStatus('c', 'pending', '等待');
      if(!pollTimer) pollTimer = setTimeout(function(){pollTimer=null;pollStatus()}, 2000);
    }).catch(function(err){
      btn.disabled = false;
      btn.textContent = '▶ 运行整条流水线';
      addLog('❌ 启动失败: '+err.message);
    });
}
