<title>Claw 团队作业 - 数据平台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#0a0a1a;color:#e0e0e0;min-height:100vh}
.container{max-width:1400px;margin:0 auto;padding:20px}
.header{text-align:center;padding:20px 20px;background:linear-gradient(135deg,#0f0f23 0%,#1a1a3e 50%,#0f0f23 100%);border-bottom:2px solid #00d4ff33;margin-bottom:20px}
.header h1{font-size:2em;background:linear-gradient(135deg,#00d4ff,#7c4dff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header .subtitle{color:#888;margin-top:6px;font-size:0.9em}
.claw-bar{display:flex;justify-content:center;gap:12px;margin-top:14px;flex-wrap:wrap}
.claw-btn{padding:10px 24px;border-radius:20px;font-size:0.95em;font-weight:600;cursor:pointer;transition:all 0.3s;border:none;background:rgba(255,255,255,0.05);color:#666}
.claw-btn:hover{background:rgba(255,255,255,0.1);color:#aaa}
.claw-btn.active{background:rgba(0,212,255,0.15);border:1px solid #00d4ff;color:#00d4ff}
.claw-btn .badge{display:block;font-size:0.7em;font-weight:400;margin-top:2px;opacity:0.6}
.claw-btn.active .badge{opacity:1;color:#4fc3f7}
.claw-btn .dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:6px;vertical-align:middle}
.dot.online{background:#43e97b;box-shadow:0 0 6px #43e97b}
.dot.offline{background:#666}
.claw-panel{display:none}
.claw-panel.active{display:block;animation:fadeIn 0.3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.update-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;background:#12122a;border-radius:12px;margin-bottom:20px;border:1px solid #1a1a3e;flex-wrap:wrap;gap:10px}
.update-bar .time{color:#4fc3f7;font-size:0.9em}
.update-bar .hint{color:#666;font-size:0.85em}
.city-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;margin-bottom:20px}
.city-card{background:#12122a;border-radius:16px;padding:16px;border:1px solid #1a1a3e;transition:all 0.3s;cursor:pointer;text-decoration:none;display:block;color:inherit}
.city-card:hover{border-color:#00d4ff66;box-shadow:0 4px 20px rgba(0,212,255,0.1);transform:translateY(-2px)}
.city-card .hint-link{font-size:0.7em;color:#4fc3f7;text-align:right;margin-top:4px;opacity:0;transition:opacity 0.3s}
.city-card:hover .hint-link{opacity:1}
.city-name{font-size:1.2em;font-weight:700;margin-bottom:10px;color:#fff}
.city-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.metric{display:flex;flex-direction:column;align-items:center;padding:5px;background:#1a1a3e;border-radius:8px}
.m-icon{font-size:0.9em}.m-val{font-size:0.95em;font-weight:700;color:#fff}.m-desc{font-size:0.7em;color:#888}
.aqi-good{color:#4fc3f7}.aqi-moderate{color:#ffeb3b}.aqi-unhealthy{color:#ff9800}.aqi-bad{color:#f44336}
.card{background:#12122a;border-radius:16px;padding:18px;border:1px solid #1a1a3e;margin-bottom:20px}
.card-title{font-size:1.1em;font-weight:600;margin-bottom:14px;color:#fff;display:flex;align-items:center;gap:10px}
.chart-img{width:100%;height:auto;border-radius:8px;cursor:pointer;transition:transform 0.3s}
.chart-img:hover{transform:scale(1.02)}
.chart-item{margin-bottom:10px}
.chart-city-legend{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:8px}
.chart-city-legend .city-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-size:0.75em;font-weight:600;border:1px solid #333}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:1000;justify-content:center;align-items:center}
.modal-content{background:#1a1a3e;border-radius:16px;padding:24px;width:90%;max-width:800px;max-height:85vh;border:1px solid #00d4ff33}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-title{font-size:1.2em;font-weight:700;color:#fff}
.modal-close{font-size:1.8em;color:#888;cursor:pointer;padding:0 8px}.modal-close:hover{color:#fff}
.modal-body{position:relative;width:100%;min-height:380px}
.chart-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
@media(max-width:900px){.chart-grid{grid-template-columns:1fr}.city-grid{grid-template-columns:1fr}}
.placeholder-box{text-align:center;padding:80px 20px;background:#12122a;border:2px dashed #1a1a3e;border-radius:16px;margin:40px 20px}
.placeholder-box .p-icon{font-size:56px;margin-bottom:12px}
.placeholder-box h3{font-size:1.3em;color:#555;margin-bottom:10px}
.placeholder-box p{font-size:0.9em;color:#444;line-height:1.8;max-width:500px;margin:0 auto}
.placeholder-box code{background:rgba(0,212,255,0.1);color:#4fc3f7;padding:3px 8px;border-radius:4px;font-size:0.85em}
.claw-dynamic{padding:10px 0}
.footer{text-align:center;padding:20px;color:#444;font-size:0.8em;border-top:1px solid #1a1a3e;margin-top:30px}
.report-header{text-align:center;padding:20px;background:#12122a;border-radius:12px;border:1px solid #1a1a3e;margin-bottom:18px}
.report-header h2{font-size:1.5em;color:#4fc3f7;margin-bottom:6px}
.report-time{color:#888;font-size:0.85em}
.report-subtitle{color:#666;font-size:0.8em;margin-top:4px}
.report-highlights{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:18px}
.highlight-card{background:#12122a;border-radius:12px;padding:14px;text-align:center;border:1px solid #1a1a3e;border-bottom:3px solid}
.hl-icon{font-size:1.8em}
.hl-text{font-size:0.8em;color:#888;margin:4px 0}
.hl-val{font-size:1.1em;font-weight:700}
.report-section-title{font-size:1.1em;font-weight:600;color:#fff;margin:16px 0 10px;padding-left:10px;border-left:3px solid #4fc3f7}
.report-city-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:10px;margin-bottom:10px}
.report-city-card{background:#12122a;border-radius:12px;padding:14px;border:1px solid #1a1a3e}
.report-city-name{font-size:1.1em;font-weight:700;margin-bottom:8px}
.report-metrics{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.report-metric{display:flex;justify-content:space-between;font-size:0.8em;padding:2px 0;border-bottom:1px solid #ffffff0d}
.report-metric span{color:#ccc}
.report-metric .r-desc{color:#666;font-size:0.85em}
.report-charts{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:10px}
.report-chart-item .chart-img{width:100%;border-radius:8px}
.report-claws{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:10px}
.report-claw-card{background:#12122a;border-radius:12px;padding:14px;border:1px solid #1a1a3e;border-left:4px solid}
.rc-label{font-size:0.9em;font-weight:600;color:#fff;margin-bottom:4px}
.rc-status{font-size:0.8em;color:#888}
.report-footer-text{text-align:center;padding:16px;color:#444;font-size:0.75em;border-top:1px solid #1a1a3e;margin-top:20px}
.exec-summary{background:#12122a;border-radius:12px;padding:20px;border:1px solid #1a1a3e;margin-bottom:18px}
.summary-title{font-size:1.15em;font-weight:700;color:#fff;margin-bottom:12px;padding-left:10px;border-left:3px solid #4fc3f7}
.summary-text{font-size:0.9em;color:#ccc;line-height:1.7;margin-bottom:8px;text-indent:2em}
.report-weather-main{font-size:0.85em;color:#aaa;margin-bottom:8px;padding:6px 10px;background:#1a1a3e;border-radius:6px}
.report-advice-grid{display:grid;grid-template-columns:1fr;gap:4px}
.advice-item{display:flex;align-items:flex-start;gap:8px;background:#1a1a3e;border-radius:6px;padding:6px 8px}
.adv-icon{font-size:1em;min-width:20px}
.adv-label{font-size:0.78em;color:#888}
.adv-text{font-size:0.8em;color:#bbb}
.chart-caption{text-align:center;font-size:0.78em;color:#666;margin-top:6px}
.hl-desc{font-size:0.75em;color:#666;margin-top:4px}
</style>
</head>

];

function initClawSwitcher(){
  var bar=document.getElementById("clawBar");
  bar.innerHTML=CLAWS.map(function(c,i){
    var dot='<span class="dot '+(c.online?"online":"offline")+'"></span>';
    return '<button class="claw-btn'+(i===0?" active":"")+'" data-claw="'+c.id+'">'+dot+c.label+'<span class="badge">'+c.badge+'</span></button>';
  }).join("");
  document.querySelectorAll(".claw-btn").forEach(function(btn){
    btn.onclick=function(){
      var id=btn.dataset.claw;
      document.querySelectorAll(".claw-btn").forEach(function(b){b.classList.remove("active")});
      document.querySelectorAll(".claw-panel").forEach(function(p){p.classList.remove("active")});
      btn.classList.add("active");
      document.getElementById("panel-"+id).classList.add("active");
      if(id!=="claw1"&&id!=="daily") loadClawContent(id, true);
    };
  });
  setInterval(checkClawStatus, 15000);
}

function checkClawStatus(){
  fetch(API_SERVER+'/api/health', {mode:'cors'}).then(function(r){return r.json();}).then(function(d){
    ['claw2','claw3'].forEach(function(id){
      var btn = document.querySelector('[data-claw="'+id+'"] .dot');
      if(!btn) return;
      btn.className = 'dot ' + (d[id] === true ? 'online' : 'offline');
    });
  }).catch(function(){});
}

function loadClawContent(id, forceRefresh){
  var container = document.getElementById(id+"Content");
  if(!container) return;
  if(forceRefresh) container.dataset.loaded = "";
  if(container.dataset.loaded) return;
  container.innerHTML = '<div class="placeholder-box"><div class="p-icon">⏳</div><h3>加载中...</h3></div>';
  fetch(API_SERVER+'/api/claw-data', {mode:'cors'})
    .then(function(r){return r.json();})
    .then(function(data){
      var cd = data[id];
      if(cd&&cd.html) return renderClawData(id, container, cd);
      showPlaceholder(id, container);
    })
    .catch(function(){
      fetch('./claw_data.json', {mode:'cors'}).then(function(r){return r.json();}).then(function(data){
        var cd = data[id];
        cd&&cd.html ? renderClawData(id, container, cd) : showPlaceholder(id, container);
      }).catch(function(){showPlaceholder(id, container);});
    });
}

function renderClawData(id, container, cd){
  container.innerHTML = cd.html; container.dataset.loaded = "1";
  var btn = document.querySelector('[data-claw="'+id+'"] .dot');
  if(btn) btn.className = "dot online";
  if(CLAW_INTERVALS[id]) clearInterval(CLAW_INTERVALS[id]);
  CLAW_INTERVALS[id] = setInterval(function(){
    var panel = document.getElementById('panel-'+id);
    if(!panel||!panel.classList.contains('active')) return;
    fetch(API_SERVER+'/api/claw-data', {mode:'cors'}).then(function(r){return r.json();}).then(function(data){
      var cd = data[id];
      if(cd&&cd.html&&cd.html!==container.innerHTML) container.innerHTML = cd.html;
    }).catch(function(){});
  }, 30000);
}

function showPlaceholder(id, container){
  var n = id.replace("claw","");
  var role = id==='claw2'?'趋势预测分析员':'场景应用分析员';
  container.innerHTML = '<div class="placeholder-box"><div class="p-icon">🤖</div><h3>Claw '+n+' · '+role+'</h3><p>请将以下 API 地址提供给 Claw '+n+' 成员</p><p><code>POST '+API_SERVER+'/api/claw/'+id+'</code></p></div>';
}

    '<div class="report-section-title">可视化图表</div><div class="report-charts">'+
    '<div class="report-chart-item"><img class="chart-img" src="./img/temp_comparison_latest.png"></div>'+
    '<div class="report-chart-item"><img class="chart-img" src="./img/air_comparison_latest.png"></div>'+
    '<div class="report-chart-item"><img class="chart-img" src="./img/uv_comparison_latest.png"></div>'+
    '<div class="report-chart-item"><img class="chart-img" src="./img/dashboard_latest.png"></div></div>'+
    '<div class="report-section-title">各Claw工作接入</div><div class="report-claws">'+
    '<div class="report-claw-card" style="border-color:#4fc3f7"><div class="rc-label">Claw 1 · 实时气象分析员</div><div class="rc-status">✅ 已接入</div></div>'+
    '<div class="report-claw-card" style="border-color:#ffb74d"><div class="rc-label">Claw 2 · 趋势预测分析员</div><div class="rc-status">⏳ 等待接入</div></div>'+
    '<div class="report-claw-card" style="border-color:#81c784"><div class="rc-label">Claw 3 · 场景应用分析员</div><div class="rc-status">✅ 已接入</div></div></div>'+
    '<div class="report-footer-text">Claw 作业系统 · 每日天气报告</div>';
}

function renderWeather(){
  document.getElementById("cityGrid").innerHTML=C.map(function(c){
    var aqC=c.aqi<=50?"aqi-good":c.aqi<=100?"aqi-moderate":c.aqi<=150?"aqi-unhealthy":"aqi-bad";
    var uvC=c.uv<=2?"#00e676":c.uv<=5?"#ffeb3b":c.uv<=7?"#ff9800":"#f44336";
    return '<a class="city-card" href="./'+c.city_file+'" style="border-left:4px solid '+c.color+'"><div class="city-name">'+c.name+'</div><div class="city-metrics">'+
      '<div class="metric"><span class="m-icon">🌡️</span><span class="m-val">'+c.temp+'°C</span><span class="m-desc">'+c.desc+'</span></div>'+
      '<div class="metric"><span class="m-icon">🤗</span><span class="m-val">'+c.feels+'°C</span><span class="m-desc">体感</span></div>'+
      '<div class="metric"><span class="m-icon">💧</span><span class="m-val">'+c.hum+'%</span><span class="m-desc">湿度</span></div>'+
      '<div class="metric"><span class="m-icon">🌀</span><span class="m-val">'+c.pres+'</span><span class="m-desc">hPa</span></div>'+
      '<div class="metric"><span class="m-icon">💨</span><span class="m-val">'+c.wind_spd+' '+c.wind_dir+'</span><span class="m-desc">风速/风向</span></div>'+
      '<div class="metric"><span class="m-icon">🌧️</span><span class="m-val">'+c.precip+'mm</span><span class="m-desc">降水</span></div>'+
      '<div class="metric"><span class="m-icon">🏭</span><span class="m-val '+aqC+'">'+c.aqi+'</span><span class="m-desc">'+c.aqi_level+'</span></div>'+
      '<div class="metric"><span class="m-icon">☀️</span><span class="m-val" style="color:'+uvC+'">'+c.uv+'</span><span class="m-desc">'+c.uv_level+'</span></div>'+
      '<div class="metric" style="grid-column:span 3"><span class="m-icon">⚠️</span><span class="m-desc">'+c.alert+'</span></div>'+
    '</div><div class="hint-link">📈 查看24h温度变化 →</div></a>';
  }).join("");
  var cg=document.getElementById("chartGrid");
  var cl=[
    {src:CHARTS.temp_comparison_latest, title:"温度对比"},
    {src:CHARTS.air_comparison_latest, title:"AQI对比"},
    {src:CHARTS.uv_comparison_latest, title:"UV对比"},
    {src:CHARTS.dashboard_latest, title:"综合仪表盘"}
  ];
  var cityColors = ['#4fc3f7','#81c784','#ffb74d','#4dd0e1','#e57373'];
  var legend='<div class="chart-city-legend">'+C.map(function(c,i){
    return '<span class="city-tag" style="border-color:'+cityColors[i%5]+'88"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+cityColors[i%5]+'"></span>'+c.name+' '+c.temp+'°C</span>';
  }).join('')+'</div>';
  cg.innerHTML=cl.map(function(ch){
    return ch.src?'<div class="chart-item"><img class="chart-img" src="'+ch.src+'" alt="'+ch.title+'"'+legend+'</div>':
      '<div class="chart-item"><div style="background:#1a1a3e;border-radius:8px;padding:40px;text-align:center;color:#555">'+ch.title+' - 等待数据</div></div>';
  }).join("");
}

function bindChartClick(){
  setTimeout(function(){
    var imgs = document.querySelectorAll(".chart-img");
    var titles = ["温度对比","AQI对比","UV对比","综合仪表盘"];
    for(var j=0;j<imgs.length;j++){
      (function(el,k){
        el.onclick = function(){
          var name = el.getAttribute("alt") || titles[Math.min(k,3)];
          openChart(name);
        };
      })(imgs[j],j);
    }
  }, 200);
}
var modalChartInstance = null;
function openChart(title) {
  document.getElementById('chartModal').style.display = 'flex';
  document.getElementById('modalTitle').textContent = title + ' - 24小时温度变化';
  var ctx = document.getElementById('modalChart').getContext('2d');
  if(modalChartInstance) modalChartInstance.destroy();
  var cityColors = ['#4fc3f7','#81c784','#ffb74d','#4dd0e1','#e57373'];
  var names = C.map(function(c){return c.name;});
  var datasets = [];
  names.forEach(function(name,i){
    var data = (TEMP_HIST[name]||[]).slice(-24);
    if(data.length){
      datasets.push({
        label: name+' °C',
        data: data.map(function(d){return d.temp;}),
        borderColor: cityColors[i],
        backgroundColor: cityColors[i]+'22',
        fill: false,
        tension: 0.3,
        pointRadius: 3,
        borderWidth: 2
      });
      datasets.push({
        label: name+' 体感',
        data: data.map(function(d){return d.feels;}),
        borderColor: cityColors[i],
        borderDash: [4, 4],
        fill: false,
        tension: 0.3,
        pointRadius: 2,
        borderWidth: 1,
        pointStyle: 'cross'
      });
    }
  });
  var labels = (TEMP_HIST[names[0]]||[]).slice(-24).map(function(d){return d.time.slice(5,16);});
  modalChartInstance = new Chart(ctx, {
    type: 'line',
    data: {labels: labels, datasets: datasets},
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: {mode: 'index', intersect: false},
      plugins: {
        legend: {labels: {color: '#aaa', font: {size: 11}}}
      },
      scales: {
        x: {ticks: {color: '#666', maxTicksLimit: 12}, grid: {color: '#ffffff0d'}},
        y: {ticks: {color: '#666'}, grid: {color: '#ffffff0d'}}
      }
    }
  });
}
function closeChart(){
  document.getElementById('chartModal').style.display = 'none';
  if(modalChartInstance){
    modalChartInstance.destroy();
    modalChartInstance = null;
  }
}

initClawSwitcher();
renderDailyReport();
renderWeather();
</script>
